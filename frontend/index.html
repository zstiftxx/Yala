<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#faf8f5" />
    <title>Educateca</title>
    <!-- El tema se aplica ANTES de que React monte. Si se esperara al primer
         render, quien tiene el modo oscuro veria un flash blanco en cada carga.
         useTema.js mantiene sincronizado este mismo atributo. -->
    <script>
      (function () {
        var tema = localStorage.getItem('tema') || 'light';
        document.documentElement.dataset.theme = tema;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
